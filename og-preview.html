<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0a0a0a;
      position: relative;
    }

    /* Foto preenchendo tudo */
    .photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* Overlay escuro em cima da foto */
    .overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(5,5,5,0.97) 0%, rgba(5,5,5,0.88) 38%, rgba(5,5,5,0.55) 62%, rgba(5,5,5,0.25) 100%),
        linear-gradient(to top,   rgba(5,5,5,0.6)  0%, transparent 50%);
    }

    /* Brilho dourado sutil */
    .glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 80% at 30% 50%, rgba(201,168,76,0.12) 0%, transparent 65%);
    }

    /* Linha vertical decorativa */
    .line-v {
      position: absolute;
      left: 72px;
      top: 60px;
      bottom: 60px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.35) 25%, rgba(201,168,76,0.35) 75%, transparent);
    }

    /* Conteúdo de texto */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 58%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 80px 0 100px;
      gap: 20px;
    }

    .tag {
      font-family: 'Inter', sans-serif;
      font-size: 10.5px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #c9a84c;
      font-weight: 400;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 78px;
      font-weight: 300;
      color: #f0e6d0;
      line-height: 0.95;
      letter-spacing: -0.01em;
    }

    .divider {
      width: 44px;
      height: 1px;
      background: linear-gradient(to right, #c9a84c, transparent);
    }

    .sub {
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      color: #8a7a65;
      font-weight: 300;
      line-height: 1.8;
      max-width: 360px;
    }

    .badge {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c9a84c;
      border: 1px solid rgba(201,168,76,0.45);
      border-radius: 999px;
      padding: 7px 18px;
      width: fit-content;
    }

    /* URL do site no rodapé */
    .footer {
      position: absolute;
      bottom: 28px;
      left: 100px;
      right: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .url {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      letter-spacing: 0.14em;
      color: rgba(201,168,76,0.4);
      text-transform: lowercase;
    }

    .dots {
      display: flex;
      gap: 5px;
    }

    .dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(201,168,76,0.25);
    }
    .dots span:first-child { background: rgba(201,168,76,0.55); }
  </style>
</head>
<body>
  <img class="photo" src="Captura de tela 2026-03-29 104303.png" alt="" />
  <div class="overlay"></div>
  <div class="glow"></div>
  <div class="line-v"></div>

  <div class="content">
    <span class="tag">Criatório Especializado · Belo Horizonte</span>
    <h1>Criadouro<br>RG</h1>
    <div class="divider"></div>
    <p class="sub">Bicudos de linhagem documentada,<br>criados com excelência e tradição.</p>
    <span class="badge">Ver Catálogo</span>
  </div>

  <div class="footer">
    <span class="url">raphagiann.github.io/projetoCriatorio</span>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
</body>
</html>
